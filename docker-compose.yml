services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.local
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build: .
    command: ["npm", "run", "mcp"]
    env_file:
      - .env.local
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: meetings
      POSTGRES_USER: meetings
      POSTGRES_PASSWORD: meetings
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-meetings}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-meetings-secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
    volumes:
      - n8n-data:/home/node/.n8n

volumes:
  postgres-data:
  redis-data:
  minio-data:
  n8n-data:
