name: meetsum

services:
  migrate:
    build: .
    command: ["npm", "run", "db:migrate"]
    env_file:
      - .env.local
    volumes:
      - /opt/meetsum/secrets:/opt/meetsum/secrets:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
